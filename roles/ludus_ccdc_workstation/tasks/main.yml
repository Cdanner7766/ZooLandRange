---
# tasks file for ludus_ccdc_workstation
# Installs blue team tools via Chocolatey on the Win11 workstation.
# Replaces install_additional_tools: true to avoid the vscode Chocolatey
# package, which consistently fails to download from update.code.visualstudio.com
# in automated environments (Microsoft rate-limits/blocks the CDN endpoint).

- name: "Bootstrap Chocolatey"
  ansible.windows.win_shell: |
    if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
      [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
      Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
    }
    $env:PATH = [System.Environment]::GetEnvironmentVariable('PATH','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('PATH','User')
  args:
    executable: powershell

- name: "Set solid dark blue desktop background on MEERKAT"
  ansible.windows.win_powershell:
    script: |
      reg load "HKU\DefaultUser" "C:\Users\Default\NTUSER.DAT" 2>$null

      $profiles = @("Registry::HKEY_USERS\DefaultUser", "HKCU:")
      foreach ($hive in $profiles) {
        $desktopKey = "$hive\Control Panel\Desktop"
        $colorsKey  = "$hive\Control Panel\Colors"

        Set-ItemProperty -Path $desktopKey -Name "Wallpaper"      -Value "" -ErrorAction SilentlyContinue
        Set-ItemProperty -Path $desktopKey -Name "WallpaperStyle" -Value "0" -ErrorAction SilentlyContinue
        Set-ItemProperty -Path $desktopKey -Name "TileWallpaper"  -Value "0" -ErrorAction SilentlyContinue

        if (-not (Test-Path $colorsKey)) { New-Item -Path $colorsKey -Force | Out-Null }
        Set-ItemProperty -Path $colorsKey -Name "Background" -Value "0 0 128" -ErrorAction SilentlyContinue
      }

      reg unload "HKU\DefaultUser" 2>$null

      try {
        Add-Type -TypeDefinition 'using System.Runtime.InteropServices; public class WP { [DllImport("user32.dll")] public static extern bool SystemParametersInfo(int a, int b, string c, int d); }'
      } catch {}
      [WP]::SystemParametersInfo(20, 0, "", 3) | Out-Null

- name: "Install blue team tools via Chocolatey"
  chocolatey.chocolatey.win_chocolatey:
    name:
      - networkmonitor
      - processhacker
      - 7zip
      - croc
      - firefox
      - burp-suite-free-edition
      - ilspy
      - explorersuite
      - wireshark
    state: present
    timeout: 2700
