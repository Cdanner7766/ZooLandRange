---
# Creates ZooLand Inc. employee AD accounts on the domain controller.
# 15 employees across IT, HR, Finance, Logistics, Warehouse, Marketing,
# Operations, Veterinary, Animal Care, Security, Facilities, Research,
# Education, Retail, and Administration departments.
# FLAMINGO mail accounts: jsmith, bwilson, mchen
# OTTER FTP accounts:     mlopez, rthomas
#
# Scoring engine defaults:
#   IMAP (FLAMINGO) - jsmith / ZooLand2025!
#   FTP  (OTTER)    - mlopez / ZooLand2025!

# GIRAFFE runs AD-integrated DNS for zooland.local (created automatically
# by Ludus during domain promotion). We add service A records and apply
# intentional CCDC DNS vulnerabilities here.
- name: "VULN - Add service DNS records and configure insecure DNS on GIRAFFE"
  ansible.windows.win_powershell:
    script: |
      # Derive the range network base from this DC's own IP
      $myIp = (Get-NetIPAddress -InterfaceAlias "Ethernet*" -AddressFamily IPv4 |
               Where-Object { $_.IPAddress -like "10.*" }).IPAddress
      $parts = $myIp.Split('.')
      $base  = "$($parts[0]).$($parts[1]).$($parts[2])"
      $zone  = "zooland.local"

      # Add A records for scored services
      Add-DnsServerResourceRecordA -ZoneName $zone -Name "web"   -IPv4Address "$base.23" -ErrorAction SilentlyContinue
      Add-DnsServerResourceRecordA -ZoneName $zone -Name "db"    -IPv4Address "$base.41" -ErrorAction SilentlyContinue
      Add-DnsServerResourceRecordA -ZoneName $zone -Name "files" -IPv4Address "$base.15" -ErrorAction SilentlyContinue
      Add-DnsServerResourceRecordA -ZoneName $zone -Name "mail"  -IPv4Address "$base.38" -ErrorAction SilentlyContinue
      Add-DnsServerResourceRecordA -ZoneName $zone -Name "ftp"   -IPv4Address "$base.29" -ErrorAction SilentlyContinue
      Add-DnsServerResourceRecordMX -ZoneName $zone -Name "." -MailExchange "mail.zooland.local" -Preference 10 -ErrorAction SilentlyContinue

      # VULN: Allow zone transfers to any host (AXFR to anyone)
      # Secure option (DISABLED): restrict SecureSecondaries to specific IPs only
      Set-DnsServerPrimaryZone -Name $zone -SecureSecondaries TransferAnyServer -ErrorAction SilentlyContinue

      # VULN: Enable recursion from any source (DNS amplification risk)
      # Secure option (DISABLED): Set-DnsServerRecursion -Enable $false
      Set-DnsServerRecursion -Enable $true

      # VULN: Disable DNS debug/event logging (hides attacker activity)
      # Secure option (DISABLED): Set-DnsServerDiagnostics -All $true
      Set-DnsServerDiagnostics -All $false

- name: "Set local Administrator password on GIRAFFE"
  ansible.windows.win_powershell:
    script: |
      net user Administrator ZooTime!
      Write-Output "Administrator password updated"

- name: "Create domainadmin account and add to Domain Admins"
  ansible.windows.win_powershell:
    script: |
      $domain = "zooland.local"
      $pass = ConvertTo-SecureString "ZooTime!" -AsPlainText -Force
      $existing = Get-ADUser -Filter "SamAccountName -eq 'domainadmin'" -ErrorAction SilentlyContinue
      if (-not $existing) {
        New-ADUser `
          -SamAccountName    "domainadmin" `
          -UserPrincipalName "domainadmin@$domain" `
          -GivenName         "Domain" `
          -Surname           "Admin" `
          -DisplayName       "Domain Admin" `
          -Description       "ZooLand Domain Administrator" `
          -AccountPassword   $pass `
          -PasswordNeverExpires $true `
          -Enabled           $true `
          -ErrorAction       Stop
        Write-Output "Created: domainadmin"
      } else {
        Set-ADAccountPassword -Identity "domainadmin" -NewPassword $pass -Reset
        Write-Output "Password updated: domainadmin"
      }
      Add-ADGroupMember -Identity "Domain Admins" -Members "domainadmin" -ErrorAction SilentlyContinue
      Write-Output "domainadmin is a Domain Admin"

