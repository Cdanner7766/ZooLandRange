---
# tasks file for ludus_ccdc_kali_setup
# Installs CCDC-relevant attack tools on the Kali attacker VM (JAGUAR).
#
# We intentionally do NOT install kali-linux-default because:
#   - It pulls ~2.4 GB including packages hosted on Cloudflare CDN (kali.download)
#     that are frequently unreachable (dbd, hyperion, windows-binaries, python3-masky)
#   - It includes hundreds of tools irrelevant to CCDC (forensics, hardware, radio)
#   - The dependency chain fails the entire install when even one package is unfetchable
#
# Instead we install a targeted list of tools used in CCDC red/blue team operations.

- name: Set Kali sources.list to archive mirror (avoids Cloudflare CDN)
  ansible.builtin.copy:
    content: |
      deb http://archive-4.kali.org/kali kali-rolling main contrib non-free non-free-firmware
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  become: true

- name: Full upgrade all packages
  ansible.builtin.apt:
    upgrade: full
  become: true

- name: Install CCDC red-team tools
  ansible.builtin.apt:
    name:
      # --- Reconnaissance ---
      - nmap
      - masscan
      - netdiscover
      - nbtscan
      - enum4linux
      - ldap-utils
      # --- Web ---
      - nikto
      - sqlmap
      - gobuster
      - dirb
      - curl
      - wget
      # --- Exploitation ---
      - metasploit-framework
      - exploitdb
      - beef-xss
      # --- Password / credential attacks ---
      - hydra
      - john
      - hashcat
      - crunch
      - wordlists
      # --- Active Directory / Windows ---
      - impacket-scripts
      - bloodhound
      - evil-winrm
      - responder
      - crackmapexec
      - netexec
      # --- SMB / file access ---
      - smbclient
      - smbmap
      # --- Network / packet capture ---
      - wireshark
      - tcpdump
      - ettercap-text-only
      - dsniff
      # --- Post-exploitation ---
      - powershell-empire
      - starkiller
      # --- Utilities ---
      - net-tools
      - dnsutils
      - whois
      - python3-pip
      - python3-impacket
      - git
      - vim
      - tmux
    state: present
    install_recommends: false
  become: true
  ignore_errors: true  # Individual package failures won't abort — most tools will still install
