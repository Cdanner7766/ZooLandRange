---
# tasks file for ludus_ccdc_web_server
# Deploys the CrazyRhino e-commerce store via Docker on PENGUIN
# Replaces the Apache/PHP stack with a Node.js + React application
# containing intentional CCDC vulnerabilities for practice

# Install prerequisites
- name: "Install required packages"
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - git
    state: present
    update_cache: true
  become: true

# VULN: Disable firewall entirely - no iptables/ufw protection
- name: "VULN - Disable UFW firewall"
  ansible.builtin.shell: |
    ufw disable
    ufw --force reset
  become: true

# Install Docker
- name: "Add Docker GPG key"
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  become: true
  args:
    creates: /usr/share/keyrings/docker-archive-keyring.gpg

- name: "Add Docker repository"
  ansible.builtin.shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
  become: true

- name: "Install Docker Engine and docker-compose-plugin"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: "Enable and start Docker"
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true

# Deploy CrazyRhino application files
- name: "Create CrazyRhino application directory"
  ansible.builtin.file:
    path: /opt/crazyrhino
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: "Copy CrazyRhino application files"
  ansible.builtin.copy:
    src: crazyrhino/
    dest: /opt/crazyrhino/
    owner: root
    group: root
    mode: "0755"
  become: true

# VULN: Credentials in a plaintext backup file accessible on the filesystem
- name: "VULN - Create plaintext credential backup file"
  ansible.builtin.copy:
    dest: /opt/crazyrhino/backup_credentials.txt
    content: |
      CrazyRhino Application Credentials Backup
      ==========================================
      Admin login:  admin / admin123
      JWT Secret:   wild-kingdom-zoo-secret-2024
      DB location:  /app/data/zoo_store.db
      API base:     http://localhost:5000/api
      Debug route:  /api/debug (no auth required)
    owner: root
    group: root
    mode: "0644"
  become: true

# Deploy docker-compose with frontend exposed on port 80
- name: "Deploy docker-compose.yml"
  ansible.builtin.copy:
    dest: /opt/crazyrhino/docker-compose.yml
    content: |
      version: '3.8'
      services:
        backend:
          build:
            context: ./backend
            dockerfile: Dockerfile
          ports:
            - "5000:5000"
          environment:
            - NODE_ENV=production
            - PORT=5000
            # VULN: Weak hardcoded JWT secret
            - JWT_SECRET=wild-kingdom-zoo-secret-2024
          volumes:
            - zoo_data:/app/data
          restart: unless-stopped
        frontend:
          build:
            context: ./frontend
            dockerfile: Dockerfile
          ports:
            # VULN: HTTP only - no TLS
            - "80:80"
          depends_on:
            - backend
          restart: unless-stopped
      volumes:
        zoo_data:
    owner: root
    group: root
    mode: "0644"
  become: true

# VULN: Create weak local OS accounts
- name: "VULN - Create weak local accounts"
  ansible.builtin.shell: |
    useradd -m -s /bin/bash admin && echo 'admin:admin' | chpasswd || true
    useradd -m -s /bin/bash webadmin && echo 'webadmin:password' | chpasswd || true
    echo 'root:ZooTime!' | chpasswd
  become: true
  ignore_errors: true

# Build and start the CrazyRhino store
- name: "Build and start CrazyRhino with Docker Compose"
  ansible.builtin.shell: |
    cd /opt/crazyrhino
    docker compose up -d --build
  become: true
  register: docker_up
  retries: 2
  delay: 10

- name: "Wait for CrazyRhino to be available on port 80"
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 80
    timeout: 120
  become: true
