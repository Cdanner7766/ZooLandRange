---
# tasks file for ludus_ccdc_mail_server
# Configures Postfix + Dovecot mail server with intentional CCDC vulnerabilities

# Non-interactive Postfix install (internet site, zooland.local)
- name: "Set Postfix preseed selections"
  ansible.builtin.shell: |
    debconf-set-selections <<EOF
    postfix postfix/main_mailer_type select Internet Site
    postfix postfix/mailname string zooland.local
    EOF
  become: true

- name: "Install mail server packages"
  ansible.builtin.apt:
    name:
      - postfix
      - dovecot-imapd
      - dovecot-pop3d
      - mailutils
    state: present
    update_cache: true
  become: true

# VULN: Open relay Postfix configuration
# disable_dns_lookups=yes stops smtpd from doing reverse PTR lookups on every
# client connection. Without it, smtpd hangs on IPs that have no PTR record
# (e.g. the scoring engine) until the lookup times out, so the 220 banner is
# never sent within the check timeout.
- name: "VULN - Configure Postfix as open relay"
  ansible.builtin.copy:
    dest: /etc/postfix/main.cf
    content: |
      # INSECURE Postfix configuration - OPEN RELAY
      # Secure option (DISABLED): smtpd_relay_restrictions = permit_mynetworks, permit_sasl_authenticated, defer_unauth_destination
      # Secure option (DISABLED): smtpd_tls_cert_file = /etc/ssl/certs/ssl-cert-snakeoil.pem
      # Secure option (DISABLED): smtpd_tls_key_file = /etc/ssl/private/ssl-cert-snakeoil.key
      # Secure option (DISABLED): smtpd_tls_security_level = may

      smtpd_banner = $myhostname ESMTP $mail_name (Debian/GNU)
      biff = no
      append_dot_mydomain = no

      myhostname = mail.zooland.local
      mydomain = zooland.local
      myorigin = $mydomain
      mydestination = $myhostname, zooland.local, localhost.localdomain, localhost
      mynetworks = 0.0.0.0/0

      # VULN: Accept mail from anyone (open relay)
      smtpd_relay_restrictions = permit

      # VULN: No TLS - all traffic in cleartext
      smtpd_tls_security_level = none

      # VULN: No SASL authentication required
      smtpd_sasl_auth_enable = no

      inet_interfaces = all
      inet_protocols = ipv4
      mailbox_size_limit = 0
      recipient_delimiter = +
      home_mailbox = Maildir/

      # smtpd_peername_lookup = no: disables smtpd's reverse PTR lookup on each
      # connecting client.  Without this, smtpd looks up the client hostname
      # before sending the 220 banner; for IPs with no PTR record (e.g. the
      # scoring engine) the lookup times out and the banner is never sent
      # within the check's 10-second window.
      smtpd_peername_lookup = no

      # disable_dns_lookups = yes: disables DNS (MX) lookups in the Postfix
      # SMTP delivery client (outbound only — does not affect smtpd).
      disable_dns_lookups = yes
    owner: root
    group: root
    mode: "0644"
  become: true

# VULN: Dovecot — plaintext auth, no TLS
- name: "VULN - Configure insecure Dovecot"
  ansible.builtin.copy:
    dest: /etc/dovecot/dovecot.conf
    content: |
      # INSECURE Dovecot configuration
      # Secure option (DISABLED): ssl = required
      # Secure option (DISABLED): disable_plaintext_auth = yes

      protocols = imap pop3
      listen = *

      # VULN: Allow plaintext authentication (credentials sent in clear)
      disable_plaintext_auth = no

      # VULN: No SSL/TLS required
      ssl = no

      mail_location = maildir:~/Maildir

      passdb {
        driver = pam
      }

      userdb {
        driver = passwd
      }

      namespace inbox {
        inbox = yes
      }
    owner: root
    group: root
    mode: "0644"
  become: true

# VULN: Weak mail user accounts
- name: "VULN - Create weak mail user accounts"
  ansible.builtin.shell: |
    useradd -m -s /bin/bash admin 2>/dev/null || true
    useradd -m -s /bin/bash user  2>/dev/null || true
    echo 'mail:mail'     | chpasswd
    echo 'admin:admin'   | chpasswd
    echo 'user:password' | chpasswd
    echo 'root:toor'     | chpasswd
    mkdir -p /home/admin/Maildir/{new,cur,tmp}
    mkdir -p /home/user/Maildir/{new,cur,tmp}
    chown -R admin:admin /home/admin/Maildir
    chown -R user:user   /home/user/Maildir
  become: true
  ignore_errors: true

# Scored employee accounts — jsmith is the IMAP scoring account
- name: "Create employee mail accounts"
  ansible.builtin.shell: |
    useradd -m -s /bin/bash jsmith  2>/dev/null || true
    useradd -m -s /bin/bash bwilson 2>/dev/null || true
    useradd -m -s /bin/bash mchen   2>/dev/null || true
    echo 'jsmith:ZooLand2025!'  | chpasswd
    echo 'bwilson:ZooLand2025!' | chpasswd
    echo 'mchen:ZooLand2025!'   | chpasswd
    mkdir -p /home/jsmith/Maildir/{new,cur,tmp}
    mkdir -p /home/bwilson/Maildir/{new,cur,tmp}
    mkdir -p /home/mchen/Maildir/{new,cur,tmp}
    chown -R jsmith:jsmith   /home/jsmith/Maildir
    chown -R bwilson:bwilson /home/bwilson/Maildir
    chown -R mchen:mchen     /home/mchen/Maildir
  become: true
  ignore_errors: true

# VULN: Disable firewall
- name: "VULN - Disable firewall"
  ansible.builtin.shell: |
    ufw disable || true
    iptables -F || true
    iptables -P INPUT   ACCEPT || true
    iptables -P FORWARD ACCEPT || true
    iptables -P OUTPUT  ACCEPT || true
  become: true

# smtpd resolves $myhostname (mail.zooland.local) before sending the 220 banner.
# Adding it to /etc/hosts avoids a DNS round-trip to the DC on every connection.
- name: "Add mail.zooland.local to /etc/hosts"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 mail.zooland.local"
    state: present
  become: true

# Debian 12 ships enforcing AppArmor profiles for each Postfix binary.
# If any profile denies an operation (e.g. accessing a socket or device),
# smtpd is killed silently before it can send the 220 banner — no log entry
# is produced because the kill may happen before syslog is even opened.
# Disabling all Postfix profiles eliminates this failure mode.
- name: "Disable AppArmor profiles for Postfix"
  ansible.builtin.shell: |
    if command -v aa-disable >/dev/null 2>&1; then
      for profile in /etc/apparmor.d/usr.lib.postfix.*; do
        [ -f "$profile" ] && aa-disable "$profile" 2>/dev/null || true
      done
      systemctl reload apparmor 2>/dev/null || true
    fi
  become: true
  ignore_errors: true

- name: "Start and enable mail services"
  ansible.builtin.shell: |
    systemctl enable postfix
    systemctl restart postfix
    systemctl enable dovecot
    systemctl restart dovecot
  become: true
