# yaml-language-server: $schema=https://docs.ludus.cloud/schemas/range-config.json
#
ludus:
  # ============================================================
  # GIRAFFE - Domain Controller + DNS (Windows Server 2022)
  # Primary DC for zooland.local
  # Manages AD, DNS (domain-integrated), DHCP, Group Policy
  # Credentials: Administrator / ZooTime!
  # Domain employee accounts (all use password: ZooLand2025!):
  #   jsmith  - John Smith,    IT Support  (IMAP scoring account on FLAMINGO)
  #   bwilson - Barbara Wilson, HR
  #   mchen   - Michelle Chen,  Finance
  #   mlopez  - Maria Lopez,    Logistics  (FTP scoring account on OTTER)
  #   rthomas - Robert Thomas,  Warehouse
  # DNS scored here (AD-integrated zone) - port 53
  # DNS VULNS (applied via ludus_ccdc_domain_users role):
  #   - Zone transfers allowed to any host (AXFR to anyone)
  #   - Recursive queries allowed from any source (DNS amplification)
  #   - No DNSSEC validation
  #   - Verbose DNS logging disabled (no audit trail)
  # ============================================================
  - vm_name: "{{ range_id }}-GIRAFFE"
    hostname: "{{ range_id }}-GIRAFFE"
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 7
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: false
    domain:
      fqdn: zooland.local
      role: primary-dc
    roles:
      - ludus_ccdc_domain_users

  # ============================================================
  # MEERKAT - Windows 11 Domain-joined Workstation
  # Used for simulating user activity and lateral movement targets
  # Credentials: Administrator / ZooTime!, domain accounts use ZooLand2025!
  # ============================================================
  - vm_name: "{{ range_id }}-MEERKAT"
    hostname: "{{ range_id }}-MEERKAT"
    template: win11-22h2-x64-enterprise-template
    vlan: 10
    ip_last_octet: 12
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: true
      install_additional_tools: false
    domain:
      fqdn: zooland.local
      role: member
    roles:
      - ludus_ccdc_workstation

  # ============================================================
  # ZEBRA - File Server (Windows Server 2022)
  # Domain-joined to zooland.local
  # Service: SMB on port 445
  # Shares: \\ZEBRA\Public, \\ZEBRA\Shared
  # Credentials: Administrator / ZooTime!, domain accounts use ZooLand2025!
  # VULNS:
  #   - Everyone has Full Control on all shares
  #   - No share passwords required
  #   - SMBv1 enabled (EternalBlue-vulnerable protocol)
  #   - Guest access enabled on shares
  #   - No share-level permissions
  #   - Firewall rules allow all SMB traffic
  # ============================================================
  - vm_name: "{{ range_id }}-ZEBRA"
    hostname: "{{ range_id }}-ZEBRA"
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 15
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    domain:
      fqdn: zooland.local
      role: member
    roles:
      - ludus_ccdc_file_server

  # ============================================================
  # PENGUIN - Web Server (Ubuntu 22.04)
  # Hosts the CrazyRhino e-commerce store via Docker
  # Service: HTTP on port 80 (React frontend + Node.js backend)
  # Admin: admin / admin123
  # VULNS:
  #   - Weak JWT secret hardcoded in environment
  #   - Default admin credentials (admin/admin123)
  #   - Debug endpoint exposes environment variables
  #   - SQL injection in product search
  #   - No rate limiting (brute force possible)
  #   - No HTTPS (cleartext traffic)
  #   - Credentials in plaintext backup file
  #   - IDOR in order endpoints
  #   - Server header discloses framework version
  #   - Firewall disabled
  # ============================================================
  - vm_name: "{{ range_id }}-PENGUIN"
    hostname: "{{ range_id }}-PENGUIN"
    template: ubuntu-22.04-x64-server-template
    vlan: 10
    ip_last_octet: 23
    ram_gb: 4
    cpus: 2
    linux: true
    testing:
      snapshot: false
      block_internet: false
    roles:
      - ludus_ccdc_web_server

  # ============================================================
  # OTTER - FTP Server (Ubuntu 22.04) - vsftpd
  # Service: FTP on port 21
  # Credentials: root/ZooTime!, ftpuser/ftpuser, admin/admin
  # VULNS:
  #   - Anonymous access enabled with upload permissions
  #   - Writable FTP root directory
  #   - No TLS/SSL encryption (cleartext credentials)
  #   - Weak local user accounts
  #   - Firewall disabled
  #   - FTP running with root privileges
  #   - No chroot for local users (directory traversal)
  # ============================================================
  - vm_name: "{{ range_id }}-OTTER"
    hostname: "{{ range_id }}-OTTER"
    template: ubuntu-22.04-x64-server-template
    vlan: 10
    ip_last_octet: 29
    ram_gb: 4
    cpus: 2
    linux: true
    testing:
      snapshot: false
      block_internet: false
    roles:
      - ludus_ccdc_ftp_server

  # ============================================================
  # FLAMINGO - Mail Server (Debian 12) - Postfix + Dovecot
  # Service: SMTP (25), POP3 (110), IMAP (143)
  # Credentials: root/ZooTime!, mail/mail, admin/admin
  # VULNS:
  #   - Open relay (accepts and relays mail from any domain)
  #   - No SMTP authentication required for relay
  #   - Plaintext protocols only (no TLS/SSL)
  #   - Weak local user passwords
  #   - Firewall disabled
  #   - No SPF/DKIM/DMARC
  # ============================================================
  - vm_name: "{{ range_id }}-FLAMINGO"
    hostname: "{{ range_id }}-FLAMINGO"
    template: debian-12-x64-server-template
    vlan: 10
    ip_last_octet: 38
    ram_gb: 4
    cpus: 2
    linux: true
    testing:
      snapshot: false
      block_internet: false
    roles:
      - ludus_ccdc_mail_server

  # ============================================================
  # HIPPO - Database Server (Debian 12) - MySQL/MariaDB
  # Service: MySQL on port 3306
  # Credentials: root/ZooTime!, admin/admin, dbuser/dbuser
  # VULNS:
  #   - MySQL root password is "password"
  #   - Remote root login allowed from any host (%)
  #   - MySQL bound to 0.0.0.0 (accessible from all interfaces)
  #   - Firewall disabled
  #   - Test database accessible to all users
  #   - Weak user accounts with full privileges
  # ============================================================
  - vm_name: "{{ range_id }}-HIPPO"
    hostname: "{{ range_id }}-HIPPO"
    template: debian-12-x64-server-template
    vlan: 10
    ip_last_octet: 41
    ram_gb: 4
    cpus: 2
    linux: true
    testing:
      snapshot: false
      block_internet: false
    roles:
      - ludus_ccdc_db_server

  # ============================================================
  # JAGUAR - Kali Linux (Red Team)
  # Used for penetration testing and CCDC red team simulation
  # On VLAN 99 (separate attacker network)
  # ============================================================
  - vm_name: "{{ range_id }}-JAGUAR"
    hostname: "{{ range_id }}-JAGUAR"
    template: kali-x64-desktop-template
    vlan: 99
    ip_last_octet: 34
    ram_gb: 8
    cpus: 4
    linux: true
    testing:
      snapshot: false
      block_internet: false
    roles:
      - ludus_ccdc_kali_setup

  # ============================================================
  # SCORESVR - Scoring Engine (Ubuntu 22.04)
  # Hosts the CCDC Blue Team Scoring Engine
  # XFCE desktop installed for GUI access
  # Dashboard: http://<scoresvr-ip>:8080
  # ============================================================
  - vm_name: "{{ range_id }}-SCORESVR"
    hostname: "{{ range_id }}-SCORESVR"
    template: ubuntu-22.04-x64-server-template
    vlan: 99
    ip_last_octet: 17
    ram_gb: 4
    cpus: 2
    linux: true
    testing:
      snapshot: false
      block_internet: false
    roles:
      - ludus_ubuntu_desktop
      - ludus_ccdc_scoring_engine

network:
  inter_vlan_default: REJECT
  rules:
    - name: Only allow corporate to attacker on 443
      vlan_src: 10
      vlan_dst: 99
      protocol: tcp
      ports: 443
      action: ACCEPT
    - name: Only allow corporate to attacker on 80
      vlan_src: 10
      vlan_dst: 99
      protocol: tcp
      ports: 80
      action: ACCEPT
    - name: Only allow corporate to attacker on 8080
      vlan_src: 10
      vlan_dst: 99
      protocol: tcp
      ports: 8080
      action: ACCEPT
    - name: Allow attacker to all corporate
      vlan_src: 99
      vlan_dst: 10
      protocol: all
      ports: all
      action: ACCEPT
