# ─── Kali Linux 2025.4 - Debian Preseed ──────────────────────────────────────
# Automates the debian-installer for the Kali offline installer ISO.
# Targets a Proxmox VM with a single VirtIO disk (/dev/vda).
# ─────────────────────────────────────────────────────────────────────────────

# Locale & keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network - DHCP, minimal hostname (Ludus renames VMs during deployment)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string kali
d-i netcfg/get_domain string
d-i netcfg/wireless_wep string

# Mirror - Kali's own package mirror
d-i mirror/country string manual
d-i mirror/http/hostname string http.kali.org
d-i mirror/http/directory string /kali
d-i mirror/http/proxy string

# Clock
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# ─── Disk partitioning ───────────────────────────────────────────────────────
# Target the VirtIO disk. Uses "regular" (no LVM/LUKS) with the atomic recipe
# (single root partition) to keep things simple.
d-i partman-auto/disk string /dev/vda
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-basicfilesystems/no_swap boolean false
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# ─── User account ────────────────────────────────────────────────────────────
# Creates user 'kali' with password 'kali'. No root login.
# User is added to the sudo group (among others) so Ansible/Packer can escalate.
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Kali
d-i passwd/username string kali
d-i passwd/user-password password kali
d-i passwd/user-password-again password kali
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false
# Groups: standard Kali defaults + sudo
d-i passwd/user-default-groups string audio cdrom dip floppy video plugdev netdev bluetooth scanner sudo

# ─── Base packages ───────────────────────────────────────────────────────────
# Install only what's needed for SSH/Ansible access.
# kali-linux-default is installed by the Packer shell provisioner after reboot
# so we don't need the GUI or tools here.
d-i pkgsel/include string openssh-server curl wget python3 sudo
d-i pkgsel/upgrade select full-upgrade
tasksel tasksel/first multiselect

# ─── GRUB ────────────────────────────────────────────────────────────────────
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/vda

# ─── Late command ─────────────────────────────────────────────────────────────
# Run inside the chroot just before the installer finishes:
#   1. Allow passwordless sudo for the kali user so Packer provisioners work.
#   2. Enable and start SSH.
#   3. Permit SSH password authentication.
d-i preseed/late_command string \
    in-target bash -c 'echo "kali ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/kali-nopasswd && chmod 0440 /etc/sudoers.d/kali-nopasswd'; \
    in-target systemctl enable ssh; \
    in-target sed -i "s/#PasswordAuthentication yes/PasswordAuthentication yes/" /etc/ssh/sshd_config; \
    in-target sed -i "s/^PasswordAuthentication no/PasswordAuthentication yes/" /etc/ssh/sshd_config

# Finish
d-i finish-install/reboot_in_progress note
